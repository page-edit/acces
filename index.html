<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beubeuland</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo {
    width: 56px;
    height: 56px;
    background: #fff;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .logo span {
    color: #000;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -1px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }
  .lock-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 20px;
    font-size: 12px;
    color: #a1a1aa;
    font-weight: 500;
    margin-bottom: 22px;
  }
  .lock-pill i { color: #fb923c; font-size: 11px; }

  p.desc {
    font-size: 14px;
    line-height: 1.6;
    color: #d4d4d8;
    margin-bottom: 28px;
  }

  .price-box {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .price-box .amount {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  .price-box .period {
    font-size: 13px;
    color: #71717a;
    margin-top: 4px;
  }
  .price-box ul {
    list-style: none;
    text-align: left;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .price-box li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #d4d4d8;
  }
  .price-box li i { color: #34d399; font-size: 12px; flex-shrink: 0; }

  .pay-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px;
    background: #fff;
    color: #000;
    font-size: 14px;
    font-weight: 700;
    border-radius: 14px;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.2s;
  }
  .pay-btn:hover { background: #e4e4e7; transform: translateY(-1px); }

  footer {
    margin-top: 28px;
    font-size: 11px;
    color: #52525b;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="logo"><span>B</span></div>
    <h1>beubeuland</h1>
    <div class="lock-pill"><i class="fas fa-lock"></i> Acces reserve</div>

    <p class="desc">
      L'acces a la plateforme beubeuland n'est pas ouvert au public pour le moment.
      Il devient disponible via un abonnement mensuel.
    </p>

    <div class="price-box">
      <div class="amount">3,99&nbsp;&euro;</div>
      <div class="period">par mois</div>
      <ul>
        <li><i class="fas fa-check-circle"></i> Feed complet, sans limite</li>
        <li><i class="fas fa-check-circle"></i> Profil personnalisable</li> 
      </ul>
    </div>

    <a href="https://buy.stripe.com/dRm9AS39SfvY4W7ff8ew80l" class="pay-btn">
      <i class="fas fa-lock"></i> S'abonner &bull; 3,99&nbsp;&euro;/mois
    </a>

    <footer>&copy; beubeuland</footer>
  </div>

</body>
</html>

<script>
// ========== CONFIG GITHUB ==========
const GITHUB_TOKEN = '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';
const GITHUB_REPO = 'https://github.com/page-edit';
';
const GITHUB_FILE = 'videos.json';

// ========== CONFIG CATBOX ==========
const CATBOX_API = 'https://catbox.moe/user/api.php';

// ========== INDEXEDDB (users, warnings, likes locaux) ==========
const DB_NAME = 'beubeuland_db';
const DB_VERSION = 3;
const STORE_USERS = 'users';
const STORE_WARNINGS = 'warnings';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_USERS)) db.createObjectStore(STORE_USERS, { keyPath: 'userId' });
      if (!db.objectStoreNames.contains(STORE_WARNINGS)) db.createObjectStore(STORE_WARNINGS, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToStore(store, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    try { tx.objectStore(store).put(data); } catch (e) { reject(e); }
  });
}

async function getAllFromStore(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromStore(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    try { tx.objectStore(store).delete(key); } catch (e) { reject(e); }
  });
}

// ========== GITHUB JSON ==========
async function getVideosJSON() {
  try {
    const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FILE}?t=${Date.now()}`);
    if (response.status === 404) return { videos: [] };
    return await response.json();
  } catch (e) {
    return { videos: [] };
  }
}

async function saveVideosJSON(data) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  
  const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
  });
  
  let sha = '';
  if (getRes.status === 200) {
    const getData = await getRes.json();
    sha = getData.sha;
  }

  const body = {
    message: 'Update videos.json',
    content: content,
    sha: sha || undefined
  };

  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  return res.ok;
}

// ========== CATBOX UPLOAD ==========
async function uploadToCatbox(file) {
  const formData = new FormData();
  formData.append('reqtype', 'fileupload');
  formData.append('fileToUpload', file);

  const response = await fetch(CATBOX_API, {
    method: 'POST',
    body: formData
  });

  if (!response.ok) throw new Error('Upload failed');
  
  const url = await response.text();
  if (!url.startsWith('http')) throw new Error('Invalid response: ' + url);
  
  return url.trim();
}

// ========== TABS ==========
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  const target = document.getElementById('admin-' + tab);
  if (target) target.classList.remove('hidden');
  document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
  const tabBtn = document.getElementById('tab-' + tab);
  if (tabBtn) tabBtn.classList.add('active');
  if (tab === 'users') loadUsers();
  if (tab === 'videos') loadAllVideos();
  if (tab === 'warnings') loadWarnings();
  if (tab === 'upload') updateStats();
}

// ========== STATS ==========
async function updateStats() {
  try {
    const users = await getAllFromStore(STORE_USERS);
    const data = await getVideosJSON();
    const warnings = await getAllFromStore(STORE_WARNINGS);
    document.getElementById('stat-users').textContent = users.length;
    document.getElementById('stat-premium').textContent = users.filter(u => u.isPremium).length;
    document.getElementById('stat-videos').textContent = data.videos ? data.videos.length : 0;
    document.getElementById('stat-warnings').textContent = warnings.length;
  } catch (err) {
    console.error('Erreur stats:', err);
  }
}

// ========== UPLOAD ==========
function handleAdminFile(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const maxBytes = 500 * 1024 * 1024;
  if (file.size > maxBytes) { alert('Fichier trop volumineux (max 500MB)'); input.value = ''; return; }
  if (!file.type.startsWith('video/')) { alert('Veuillez sélectionner un fichier vidéo'); input.value = ''; return; }
  document.getElementById('admin-dropzone').classList.add('hidden');
  document.getElementById('admin-form').classList.remove('hidden');
  const titleInput = document.getElementById('admin-title');
  if (titleInput && !titleInput.value) titleInput.value = file.name.split('.')[0];
}

async function publishAdminVideo() {
  const title = document.getElementById('admin-title').value.trim();
  if (!title) { alert('Titre requis'); return; }
  
  const fileInput = document.getElementById('admin-file');
  const file = fileInput.files[0];
  if (!file) { alert('Aucun fichier sélectionné'); return; }

  const btn = document.getElementById('admin-publish-btn');
  const progressEl = document.getElementById('admin-progress');
  btn.disabled = true; 
  btn.textContent = 'Upload en cours...';
  progressEl.style.display = 'block';
  progressEl.textContent = 'Upload vers Catbox...';

  try {
    const videoUrl = await uploadToCatbox(file);
    progressEl.textContent = 'Sauvegarde...';

    const data = await getVideosJSON();
    
    data.videos.unshift({
      id: Date.now().toString(),
      title: title,
      description: document.getElementById('admin-desc').value || '',
      videoUrl: videoUrl,
      fileType: file.type,
      authorName: 'ines_dz🇲🇦🫦',
      isAdmin: true,
      likes: 0,
      createdAt: new Date().toISOString()
    });

    progressEl.textContent = 'Publication...';
    const saved = await saveVideosJSON(data);
    
    if (!saved) throw new Error('Échec de la sauvegarde');

    alert('✅ Vidéo publiée !');
    document.getElementById('admin-form').classList.add('hidden');
    document.getElementById('admin-dropzone').classList.remove('hidden');
    document.getElementById('admin-title').value = '';
    document.getElementById('admin-desc').value = '';
    fileInput.value = '';
    btn.disabled = false;
    btn.textContent = 'Publier sur le feed';
    progressEl.style.display = 'none';
    updateStats();

  } catch (err) {
    console.error('Erreur:', err);
    alert('❌ Erreur: ' + (err.message || 'Upload échoué'));
    btn.disabled = false;
    btn.textContent = 'Publier sur le feed';
    progressEl.style.display = 'none';
  }
}

// ========== USERS ==========
async function loadUsers() {
  const container = document.getElementById('users-list');
  if (!container) return;

  try {
    const users = await getAllFromStore(STORE_USERS);
    const warnings = await getAllFromStore(STORE_WARNINGS);

    if (users.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i>Aucun utilisateur inscrit</div>';
      return;
    }

    let html = '<table class="data-table"><thead><tr>';
    html += '<th>Utilisateur</th><th>Statut</th><th>Avertissements</th><th>Inscrit le</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    users.forEach(u => {
      const userWarnings = warnings.filter(w => w.userId === u.userId);
      const badgeClass = u.isPremium ? 'badge-premium' : 'badge-free';
      const badgeText = u.isPremium ? 'Premium' : 'Gratuit';
      const avatarContent = u.avatar ? `<img src="${escapeHtml(u.avatar)}" alt="">` : (u.name || 'B').charAt(0).toUpperCase();

      html += `<tr>
        <td>
          <div class="user-cell">
            <div class="user-avatar">${avatarContent}</div>
            <div class="user-info">
              <span class="user-name">${escapeHtml(u.name || 'Anonyme')}</span>
              <span class="user-id">${u.userId}</span>
            </div>
          </div>
        </td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>${userWarnings.length}</td>
        <td>${u.joinedAt ? new Date(u.joinedAt).toLocaleDateString('fr-FR') : '-'}</td>
        <td>
          <div style="display: flex; gap: 6px;">
            <button onclick="openWarningModal('${u.userId}', '${escapeHtml(u.name || 'Anonyme')}')" class="btn-icon btn-warn" title="Avertir"><i class="fas fa-exclamation-triangle"></i></button>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = '<div class="table-scroll-wrapper">' + html + '</div>';
  } catch (err) {
    container.innerHTML = '<div class="empty-state">Erreur de chargement</div>';
  }
}

// ========== VIDEOS ==========
async function loadAllVideos() {
  const container = document.getElementById('all-videos-list');
  if (!container) return;

  try {
    const data = await getVideosJSON();
    const videos = data.videos || [];

    if (videos.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-video"></i>Aucune vidéo publiée</div>';
      return;
    }

    let html = '<table class="data-table"><thead><tr>';
    html += '<th>Vidéo</th><th>URL</th><th>Date</th><th>Likes</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    videos.forEach(v => {
      html += `<tr>
        <td>
          <div style="font-weight: 600;">${escapeHtml(v.title)}</div>
          <div style="font-size: 11px; color: #71717a;">${escapeHtml(v.description || '').substring(0, 60)}...</div>
        </td>
        <td>
          <a href="${v.videoUrl}" target="_blank" style="color: #60a5fa; font-size: 11px; word-break: break-all;">${v.videoUrl.substring(0, 40)}...</a>
        </td>
        <td style="white-space: nowrap;">${v.createdAt ? new Date(v.createdAt).toLocaleDateString('fr-FR') : '-'}</td>
        <td>${v.likes || 0}</td>
        <td>
          <div style="display: flex; gap: 6px;">
            <button onclick="previewVideo('${v.id}')" class="btn-icon btn-view"><i class="fas fa-play"></i></button>
            <button onclick="deleteAdminVideo('${v.id}')" class="btn-icon btn-delete"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = '<div class="table-scroll-wrapper">' + html + '</div>';
    document.getElementById('stat-videos').textContent = videos.length;

  } catch (err) {
    container.innerHTML = '<div class="empty-state">Erreur</div>';
  }
}

async function deleteAdminVideo(id) {
  if (!confirm('Supprimer cette vidéo ?')) return;
  
  try {
    const data = await getVideosJSON();
    data.videos = data.videos.filter(v => v.id !== id);
    await saveVideosJSON(data);
    loadAllVideos();
    updateStats();
  } catch (err) {
    alert('❌ Erreur: ' + err.message);
  }
}

// ========== PREVIEW ==========
async function previewVideo(videoId) {
  try {
    const data = await getVideosJSON();
    const video = data.videos.find(v => v.id === videoId);
    if (!video || !video.videoUrl) {
      alert('Vidéo introuvable');
      return;
    }

    const videoEl = document.getElementById('preview-video');
    videoEl.src = video.videoUrl;
    videoEl.load();
    
    document.getElementById('video-preview-modal').classList.add('visible');
    videoEl.play().catch(() => {});
  } catch (err) {
    alert('❌ Erreur de lecture');
  }
}

function closeVideoPreview() {
  const videoEl = document.getElementById('preview-video');
  if (videoEl) {
    videoEl.pause();
    videoEl.src = '';
  }
  document.getElementById('video-preview-modal').classList.remove('visible');
}

// ========== WARNINGS ==========
function openWarningModal(userId, userName) {
  document.getElementById('warning-target-id').value = userId;
  document.getElementById('warning-target-name').textContent = userName;
  document.getElementById('warning-message').value = '';
  document.getElementById('warning-modal').classList.add('visible');
}

function closeWarningModal() {
  document.getElementById('warning-modal').classList.remove('visible');
}

async function sendWarning() {
  const userId = document.getElementById('warning-target-id').value;
  const message = document.getElementById('warning-message').value.trim();
  if (!message) { alert('Message requis'); return; }
  try {
    await saveToStore(STORE_WARNINGS, {
      userId: userId, message: message, seen: false,
      sentAt: new Date().toISOString()
    });
    alert('✅ Avertissement envoyé !');
    closeWarningModal();
    updateStats();
    if (!document.getElementById('admin-warnings').classList.contains('hidden')) {
      loadWarnings();
    }
  } catch (err) {
    alert('❌ Erreur: ' + err.message);
  }
}

async function loadWarnings() {
  const container = document.getElementById('warnings-list');
  if (!container) return;

  try {
    const warnings = await getAllFromStore(STORE_WARNINGS);
    const users = await getAllFromStore(STORE_USERS);

    if (warnings.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Aucun avertissement</div>';
      return;
    }

    warnings.sort((a, b) => new Date(b.sentAt) - new Date(a.sentAt));

    let html = '';
    warnings.forEach(w => {
      const user = users.find(u => u.userId === w.userId);
      const userName = user ? user.name : w.userId;
      const statusClass = w.seen ? 'seen' : 'unseen';
      const statusText = w.seen ? 'Vu' : 'Non vu';

      html += `<div class="warning-item">
        <div class="warning-header">
          <div style="display: flex; align-items: center; gap: 10px;">
            <span class="warning-user">${escapeHtml(userName)}</span>
            <span class="warning-status ${statusClass}">${statusText}</span>
          </div>
          <span class="warning-date">${w.sentAt ? new Date(w.sentAt).toLocaleDateString('fr-FR') : '-'}</span>
        </div>
        <div class="warning-msg">${escapeHtml(w.message)}</div>
      </div>`;
    });

    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div class="empty-state">Erreur</div>';
  }
}

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

window.onload = function() {
  try {
    document.getElementById('admin-upload').classList.remove('hidden');
    document.getElementById('tab-upload').classList.add('active');
    updateStats();
  } catch (err) {
    console.error('Erreur init:', err);
  }
}
</script>

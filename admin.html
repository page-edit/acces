<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beubeuland • Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #09090b; color: #fafafa; margin: 0; min-height: 100vh; }
.admin-container { max-width: 1200px; margin: 0 auto; padding: 16px; }
@media (min-width: 768px) { .admin-container { padding: 24px; } }
.admin-header { display: flex; flex-direction: column; gap: 16px; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #27272a; }
@media (min-width: 640px) { .admin-header { flex-direction: row; align-items: center; justify-content: space-between; } }
.admin-header-left { display: flex; align-items: center; gap: 14px; }
.admin-logo { width: 44px; height: 44px; background: #fff; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
.admin-logo span { color: #000; font-weight: 900; font-size: 22px; letter-spacing: -1px; }
.admin-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.admin-subtitle { font-size: 13px; color: #a1a1aa; margin-top: 2px; }
.admin-badge { font-size: 10px; font-weight: 700; background: #dc2626; color: #fff; padding: 3px 10px; border-radius: 20px; margin-left: 10px; }
.admin-back-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: #18181b; border: 1px solid #27272a; border-radius: 14px; color: #d4d4d8; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
.admin-back-btn:hover { background: #27272a; color: #fff; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
@media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; } }
.stat-card { background: #18181b; border: 1px solid #27272a; border-radius: 14px; padding: 14px; }
@media (min-width: 640px) { .stat-card { padding: 20px; border-radius: 16px; } }
.stat-label { font-size: 12px; color: #a1a1aa; font-weight: 500; margin-bottom: 8px; }
.stat-value { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
@media (min-width: 640px) { .stat-value { font-size: 32px; } }
.stat-value.emerald { color: #34d399; }
.stat-value.orange { color: #fb923c; }
.tabs-wrapper { display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; }
.tabs-wrapper::-webkit-scrollbar { display: none; }
.admin-tab { padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #a1a1aa; background: transparent; border: none; cursor: pointer; white-space: nowrap; }
.admin-tab.active { color: #fff; background: #27272a; }
.content-card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; overflow: hidden; }
.content-card-header { padding: 18px 20px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; }
.data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.table-scroll-wrapper { overflow-x: auto; }
.data-table th { text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; border-bottom: 1px solid #27272a; background: #0f0f11; }
@media (min-width: 640px) { .data-table th { padding: 12px 20px; font-size: 11px; } }
.data-table td { padding: 10px 14px; font-size: 12px; color: #d4d4d8; border-bottom: 1px solid #27272a; }
@media (min-width: 640px) { .data-table td { padding: 14px 20px; font-size: 13px; } }
.data-table tr:last-child td { border-bottom: none; }
.btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
.btn-view { background: #27272a; color: #d4d4d8; }
.btn-delete { background: #7f1d1d; color: #fca5a5; }
.upload-zone { border: 2px dashed #3f3f46; border-radius: 16px; padding: 32px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover { border-color: #10b981; }
.upload-zone i { font-size: 40px; color: #52525b; margin-bottom: 12px; }
.admin-input { width: 100%; padding: 14px 16px; background: #0f0f11; border: 1px solid #27272a; border-radius: 12px; color: #fafafa; font-size: 15px; outline: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.visible { display: flex; }
.modal-box { background: #18181b; border: 1px solid #27272a; border-radius: 16px; width: calc(100% - 32px); max-width: 420px; overflow: hidden; }
.modal-header { padding: 20px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { font-size: 16px; font-weight: 700; margin: 0; }
.modal-close { background: none; border: none; color: #71717a; cursor: pointer; font-size: 16px; }
.modal-body { padding: 20px; }
.modal-footer { padding: 16px 20px; border-top: 1px solid #27272a; display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-btn-primary { background: #ea580c; color: #fff; }
.modal-btn-secondary { background: #27272a; color: #d4d4d8; }
.empty-state { text-align: center; padding: 32px 16px; color: #71717a; }
.empty-state i { font-size: 32px; margin-bottom: 12px; display: block; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="admin-container">

  <div class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo"><span>B</span></div>
      <div>
        <div style="display:flex;align-items:center;">
          <span class="admin-title">beubeuland</span>
          <span class="admin-badge">ines_dz🇲🇦🫦</span>
        </div>
        <span class="admin-subtitle">Panneau de modération</span>
      </div>
    </div>
    <a href="index.html" class="admin-back-btn">
      <i class="fas fa-arrow-left"></i> Retour au client
    </a>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Vidéos</div><div class="stat-value" id="stat-videos">0</div></div>
    <div class="stat-card"><div class="stat-label">Utilisateurs</div><div class="stat-value emerald" id="stat-users">0</div></div>
    <div class="stat-card"><div class="stat-label">Premium</div><div class="stat-value emerald" id="stat-premium">0</div></div>
    <div class="stat-card"><div class="stat-label">Avertissements</div><div class="stat-value orange" id="stat-warnings">0</div></div>
  </div>

  <div class="tabs-wrapper">
    <button onclick="showTab('upload')" class="admin-tab active" id="tab-upload"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
    <button onclick="showTab('videos')" class="admin-tab" id="tab-videos"><i class="fas fa-video"></i> Vidéos</button>
    <button onclick="showTab('users')" class="admin-tab" id="tab-users"><i class="fas fa-users"></i> Users</button>
    <button onclick="showTab('warnings')" class="admin-tab" id="tab-warnings"><i class="fas fa-exclamation-triangle"></i> Warn</button>
  </div>

  <div id="admin-upload" class="tab-content">
    <div class="content-card" style="max-width: 600px;">
      <div class="content-card-header"><i class="fas fa-cloud-upload-alt text-emerald-400"></i> Publier une vidéo</div>
      <div style="padding: 20px;">
        <div id="admin-dropzone" onclick="document.getElementById('admin-file').click()" class="upload-zone">
          <i class="fas fa-cloud-upload-alt"></i>
          <div style="font-size: 16px; font-weight: 600;">Glissez votre vidéo ici</div>
          <div style="font-size: 12px; color: #71717a;">MP4, MOV — Max 500MB</div>
        </div>
        <input type="file" id="admin-file" accept="video/*" class="hidden" onchange="handleAdminFile(this)">
        <div id="admin-form" class="hidden" style="margin-top: 20px;">
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" id="admin-title" placeholder="Titre *" class="admin-input">
            <textarea id="admin-desc" placeholder="Description" rows="3" class="admin-input" style="resize: vertical; min-height: 80px;"></textarea>
            <div id="admin-progress" style="font-size: 12px; color: #a1a1aa; display: none;"></div>
            <button id="admin-publish-btn" onclick="publishAdminVideo()" class="modal-btn modal-btn-primary" style="padding: 14px;">Publier</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="admin-videos" class="tab-content hidden">
    <div class="content-card">
      <div class="content-card-header"><i class="fas fa-video text-emerald-400"></i> Toutes les vidéos</div>
      <div id="all-videos-list"></div>
    </div>
  </div>

  <div id="admin-users" class="tab-content hidden">
    <div class="content-card">
      <div class="content-card-header"><i class="fas fa-users text-emerald-400"></i> Utilisateurs</div>
      <div id="users-list"></div>
    </div>
  </div>

  <div id="admin-warnings" class="tab-content hidden">
    <div class="content-card">
      <div class="content-card-header"><i class="fas fa-exclamation-triangle text-orange-400"></i> Avertissements</div>
      <div id="warnings-list"></div>
    </div>
  </div>

</div>

<div id="video-preview-modal" class="modal-overlay">
  <div class="modal-box" style="max-width: 520px;">
    <div class="modal-header">
      <h3><i class="fas fa-play-circle text-emerald-400"></i> Aperçu</h3>
      <button onclick="closeVideoPreview()" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div style="padding: 0; background: #000;">
      <video id="preview-video" style="width: 100%; max-height: 70vh; display: block;" controls playsinline></video>
    </div>
    <div class="modal-footer">
      <button onclick="closeVideoPreview()" class="modal-btn modal-btn-secondary">Fermer</button>
    </div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const GITHUB_REPO = 'page-edit/beubeuland';
const GITHUB_FILE = 'videos.json';
const CATBOX_API = 'https://catbox.moe/user/api.php';

// Token depuis localStorage ou prompt
let GITHUB_TOKEN = localStorage.getItem('github_token');
if (!GITHUB_TOKEN) {
  GITHUB_TOKEN = prompt('🔐 Entrez votre token GitHub (une seule fois) :');
  if (GITHUB_TOKEN) localStorage.setItem('github_token', GITHUB_TOKEN);
}

// ========== DB LOCAL ==========
const DB_NAME = 'beubeuland_db';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'userId' });
      if (!db.objectStoreNames.contains('warnings')) db.createObjectStore('warnings', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToStore(store, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.objectStore(store).put(data);
  });
}

async function getAllFromStore(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromStore(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.objectStore(store).delete(key);
  });
}

// ========== GITHUB ==========
async function getVideosJSON() {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${GITHUB_FILE}?t=${Date.now()}`);
    if (res.status === 404) return { videos: [] };
    return await res.json();
  } catch (e) {
    return { videos: [] };
  }
}

async function saveVideosJSON(data) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
  });
  let sha = '';
  if (getRes.status === 200) {
    const getData = await getRes.json();
    sha = getData.sha;
  }
  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Update videos', content, sha: sha || undefined })
  });
  return res.ok;
}

// ========== CATBOX ==========
async function uploadToCatbox(file) {
  const formData = new FormData();
  formData.append('reqtype', 'fileupload');
  formData.append('fileToUpload', file);
  const res = await fetch(CATBOX_API, { method: 'POST', body: formData });
  if (!res.ok) throw new Error('Upload failed');
  const url = await res.text();
  if (!url.startsWith('http')) throw new Error('Invalid: ' + url);
  return url.trim();
}

// ========== UI ==========
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById('admin-' + tab).classList.remove('hidden');
  document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'videos') loadAllVideos();
  if (tab === 'users') loadUsers();
  if (tab === 'warnings') loadWarnings();
  if (tab === 'upload') updateStats();
}

async function updateStats() {
  try {
    const users = await getAllFromStore('users');
    const warnings = await getAllFromStore('warnings');
    const data = await getVideosJSON();
    document.getElementById('stat-users').textContent = users.length;
    document.getElementById('stat-premium').textContent = users.filter(u => u.isPremium).length;
    document.getElementById('stat-videos').textContent = data.videos ? data.videos.length : 0;
    document.getElementById('stat-warnings').textContent = warnings.length;
  } catch (err) { console.error(err); }
}

function handleAdminFile(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  if (file.size > 500 * 1024 * 1024) { alert('Max 500MB'); input.value = ''; return; }
  if (!file.type.startsWith('video/')) { alert('Vidéo uniquement'); input.value = ''; return; }
  document.getElementById('admin-dropzone').classList.add('hidden');
  document.getElementById('admin-form').classList.remove('hidden');
  const title = document.getElementById('admin-title');
  if (!title.value) title.value = file.name.split('.')[0];
}

async function publishAdminVideo() {
  const title = document.getElementById('admin-title').value.trim();
  if (!title) { alert('Titre requis'); return; }
  const file = document.getElementById('admin-file').files[0];
  if (!file) { alert('Fichier requis'); return; }

  const btn = document.getElementById('admin-publish-btn');
  const progress = document.getElementById('admin-progress');
  btn.disabled = true; btn.textContent = 'Upload...';
  progress.style.display = 'block'; progress.textContent = 'Upload Catbox...';

  try {
    const videoUrl = await uploadToCatbox(file);
    progress.textContent = 'Sauvegarde...';
    const data = await getVideosJSON();
    data.videos.unshift({
      id: Date.now().toString(),
      title, description: document.getElementById('admin-desc').value || '',
      videoUrl, fileType: file.type,
      authorName: 'ines_dz🇲🇦🫦', isAdmin: true,
      likes: 0, createdAt: new Date().toISOString()
    });
    progress.textContent = 'Publication...';
    const saved = await saveVideosJSON(data);
    if (!saved) throw new Error('Save failed');

    alert('✅ Vidéo publiée !');
    document.getElementById('admin-form').classList.add('hidden');
    document.getElementById('admin-dropzone').classList.remove('hidden');
    document.getElementById('admin-title').value = '';
    document.getElementById('admin-desc').value = '';
    document.getElementById('admin-file').value = '';
    btn.disabled = false; btn.textContent = 'Publier';
    progress.style.display = 'none';
    updateStats();
  } catch (err) {
    alert('❌ Erreur: ' + err.message);
    btn.disabled = false; btn.textContent = 'Publier';
    progress.style.display = 'none';
  }
}

async function loadAllVideos() {
  const container = document.getElementById('all-videos-list');
  try {
    const data = await getVideosJSON();
    const videos = data.videos || [];
    if (!videos.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-video"></i>Aucune vidéo</div>'; return; }

    let html = '<table class="data-table"><thead><tr><th>Vidéo</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
    videos.forEach(v => {
      html += `<tr>
        <td><div style="font-weight:600;">${escapeHtml(v.title)}</div><div style="font-size:11px;color:#71717a;">${escapeHtml(v.description || '').substring(0,50)}...</div></td>
        <td style="white-space:nowrap;">${v.createdAt ? new Date(v.createdAt).toLocaleDateString('fr-FR') : '-'}</td>
        <td><div style="display:flex;gap:6px;">
          <button onclick="previewVideo('${v.id}')" class="btn-icon btn-view"><i class="fas fa-play"></i></button>
          <button onclick="deleteAdminVideo('${v.id}')" class="btn-icon btn-delete"><i class="fas fa-trash"></i></button>
        </div></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = '<div class="table-scroll-wrapper">' + html + '</div>';
    document.getElementById('stat-videos').textContent = videos.length;
  } catch (err) { container.innerHTML = '<div class="empty-state">Erreur</div>'; }
}

async function deleteAdminVideo(id) {
  if (!confirm('Supprimer ?')) return;
  try {
    const data = await getVideosJSON();
    data.videos = data.videos.filter(v => v.id !== id);
    await saveVideosJSON(data);
    loadAllVideos(); updateStats();
  } catch (err) { alert('❌ Erreur: ' + err.message); }
}

async function previewVideo(videoId) {
  try {
    const data = await getVideosJSON();
    const video = data.videos.find(v => v.id === videoId);
    if (!video) { alert('Introuvable'); return; }
    document.getElementById('preview-video').src = video.videoUrl;
    document.getElementById('video-preview-modal').classList.add('visible');
  } catch (err) { alert('❌ Erreur'); }
}

function closeVideoPreview() {
  const v = document.getElementById('preview-video');
  v.pause(); v.src = '';
  document.getElementById('video-preview-modal').classList.remove('visible');
}

async function loadUsers() {
  const container = document.getElementById('users-list');
  try {
    const users = await getAllFromStore('users');
    if (!users.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i>Aucun</div>'; return; }
    let html = '<table class="data-table"><thead><tr><th>User</th><th>Statut</th></tr></thead><tbody>';
    users.forEach(u => {
      html += `<tr><td>${escapeHtml(u.name || 'Anonyme')}</td><td>${u.isPremium ? 'Premium' : 'Gratuit'}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="empty-state">Erreur</div>'; }
}

async function loadWarnings() {
  const container = document.getElementById('warnings-list');
  try {
    const warnings = await getAllFromStore('warnings');
    if (!warnings.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Aucun</div>'; return; }
    let html = '';
    warnings.forEach(w => {
      html += `<div style="padding:12px;border-bottom:1px solid #27272a;">
        <div style="font-size:11px;color:#71717a;">${new Date(w.sentAt).toLocaleDateString('fr-FR')}</div>
        <div style="margin-top:4px;">${escapeHtml(w.message)}</div>
      </div>`;
    });
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="empty-state">Erreur</div>'; }
}

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

window.onload = () => {
  document.getElementById('admin-upload').classList.remove('hidden');
  document.getElementById('tab-upload').classList.add('active');
  updateStats();
};
</script>
</body>
</html>
